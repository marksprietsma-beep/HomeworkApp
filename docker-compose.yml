services:
  postgres:
    image: postgres:16-alpine
    container_name: homework-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: homework
      POSTGRES_PASSWORD: homework
      POSTGRES_DB: homework_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homework -d homework_app"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
